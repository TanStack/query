        mechanism: "BroadcastChannel-based synchronization is browser-oriented and should be gated from SSR environments."
        wrong_pattern: |
          broadcastQueryClient({ queryClient, broadcastChannel: 'app' })
        correct_pattern: |
          if (typeof window !== 'undefined') {
            broadcastQueryClient({ queryClient, broadcastChannel: 'app' })
          }
        source: "docs/framework/react/plugins/broadcastQueryClient.md; package peer behavior"
        priority: "MEDIUM"
        status: "active"

