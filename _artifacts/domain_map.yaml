    tasks:
      - "Avoid unnecessary rerenders"
      - "Select small slices from large responses"
      - "Keep immutable query results safe in forms"
    failure_modes:
      - mistake: "Rest destructuring disables tracked props"
        mechanism: "Object rest touches every property and opts out of property-level tracking."
        wrong_pattern: |
          const { data, ...queryInfo } = useQuery(options)
        correct_pattern: |
          const { data, isPending, isError, error } = useQuery(options)
        source: "docs/eslint/no-rest-destructuring.md; docs/framework/react/guides/render-optimizations.md"
        priority: "MEDIUM"
