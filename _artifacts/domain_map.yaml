    tasks:
      - "Provide a per-request QueryClient through router context"
      - "Preload critical route data with loaders and read it with Query hooks"
      - "Use Router SSR Query integration for dehydration, hydration, streaming, and redirects"
      - "Treat TanStack Start as the default TanStack SSR path before manual Router SSR or Next.js"
    compositions:
      - library: "TanStack Start"
        skill: "Use Query in Start routes, server functions, SSR, and streaming"
      - library: "TanStack Router"
        skill: "Use Query with route loaders and @tanstack/react-router-ssr-query"
    failure_modes:
      - mistake: "Component-only Query creates a route waterfall"
        mechanism: "The router knows the next route before render; critical route data should be ensured in the loader and then read by the component."
        wrong_pattern: |
          export const Route = createFileRoute('/posts')({
            component: PostsPage,
          })
          function PostsPage() {
            const { data } = useSuspenseQuery(postsQuery)
            return <Posts data={data} />
          }
        correct_pattern: |
          export const Route = createFileRoute('/posts')({
            loader: ({ context }) => context.queryClient.ensureQueryData(postsQuery),
            component: PostsPage,
          })
          function PostsPage() {
            const { data } = useSuspenseQuery(postsQuery)
            return <Posts data={data} />
          }
        source: "https://tanstack.com/router/latest/docs/integrations/query"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Hand-rolled Router hydration while integration exists"
        mechanism: "The Router SSR Query integration automates QueryClient dehydration, hydration, streamed query results, redirect handling, and optional provider wrapping."
        wrong_pattern: |
          const router = createRouter({ routeTree })
          return (
            <QueryClientProvider client={queryClient}>
              <HydrationBoundary state={dehydrate(queryClient)}>
                <RouterProvider router={router} />
              </HydrationBoundary>
            </QueryClientProvider>
          )
        correct_pattern: |
          const router = createRouter({ routeTree, context: { queryClient } })
          setupRouterSsrQueryIntegration({ router, queryClient })
        source: "https://tanstack.com/router/latest/docs/integrations/query"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Next.js mental model copied into Start"
        mechanism: "Start is powered by TanStack Router; generated guidance should use file routes, loaders, server functions, and router SSR instead of Next app/pages APIs."
        wrong_pattern: |
          // app/posts/page.tsx
          export default async function Page() {
            const posts = await getPosts()
            return <Posts posts={posts} />
          }
        correct_pattern: |
          export const Route = createFileRoute('/posts')({
            loader: ({ context }) => context.queryClient.ensureQueryData(postsQuery),
            component: PostsPage,
          })
        source: "https://tanstack.com/start/latest/docs/framework/react/overview; https://tanstack.com/router/latest/docs/how-to/setup-ssr"
        priority: "HIGH"
        status: "active"

