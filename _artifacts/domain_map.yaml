      - mistake: "Query result in hook deps"
        mechanism: "Query result objects are not referentially stable; destructure stable members."
        wrong_pattern: |
          const query = useQuery(options)
          useEffect(() => sync(query.data), [query])
        correct_pattern: |
          const { data } = useQuery(options)
          useEffect(() => sync(data), [data])
        source: "docs/eslint/no-unstable-deps.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Vue v-model mutates query result"
        mechanism: "Vue Query results are immutable; two-way binding needs a mutable copy."
        wrong_pattern: |
          <input v-model="todo.title" />
        correct_pattern: |
          const editableTodo = ref({ ...todo.value })
          <input v-model="editableTodo.title" />
