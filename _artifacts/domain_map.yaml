        priority: "HIGH"
        status: "active"

  - name: "Prefetch and remove request waterfalls"
    slug: "prefetch-and-remove-request-waterfalls"
    domain: "rendering-across-environments"
    description: "Prefetch data in event handlers, component lifecycle, TanStack Router and Start loaders, other routers, and query functions to flatten waterfalls before render."
    type: "lifecycle"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
    covers:
      - "prefetchQuery"
      - "prefetchInfiniteQuery"
      - "ensureQueryData"
      - "usePrefetchQuery"
      - "TanStack Router loaders"
      - "TanStack Start routes"
      - "router loaders"
      - "request waterfalls"
    tasks:
      - "Prefetch on hover or focus"
      - "Prefetch child data from parent routes"
      - "Pair Query with TanStack Router loaders and TanStack Start routes"
      - "Pair Query with React Router loaders when the app uses React Router"
    compositions:
      - library: "TanStack Start"
        skill: "Compose TanStack Query with Start routes and SSR"
      - library: "TanStack Router"
        skill: "Compose TanStack Query with TanStack Router loaders and SSR Query integration"
      - library: "React Router"
        skill: "Compose TanStack Query with React Router loaders"
    failure_modes:
      - mistake: "Expecting prefetchQuery to return data"
        mechanism: "prefetchQuery returns void and swallows errors; use fetchQuery when data or thrown errors are needed."
        wrong_pattern: |
          const data = await queryClient.prefetchQuery(todoOptions(id))
        correct_pattern: |
          const data = await queryClient.fetchQuery(todoOptions(id))
        source: "docs/framework/react/guides/prefetching.md; docs/reference/QueryClient.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Prefetch staleTime only set on prefetch"
        mechanism: "staleTime passed to prefetch applies only to that prefetch call; useQuery still needs its own freshness policy."
        wrong_pattern: |
          await queryClient.prefetchQuery({ queryKey, queryFn, staleTime: 60_000 })
          useQuery({ queryKey, queryFn })
        correct_pattern: |
          const options = queryOptions({ queryKey, queryFn, staleTime: 60_000 })
          await queryClient.prefetchQuery(options)
          useQuery(options)
        source: "docs/framework/react/guides/prefetching.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Suspense prefetch after suspension"
        mechanism: "Effects do not run until after a suspenseful query resolves, so they cannot flatten that waterfall."
        wrong_pattern: |
