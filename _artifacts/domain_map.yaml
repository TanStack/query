        mechanism: "Hydrated cache can be garbage collected before persisted maxAge expires."
        wrong_pattern: |
          const queryClient = new QueryClient()
          persistQueryClient({ queryClient, persister, maxAge: DAY })
        correct_pattern: |
          const queryClient = new QueryClient({
            defaultOptions: { queries: { gcTime: DAY } },
          })
          persistQueryClient({ queryClient, persister, maxAge: DAY })
        source: "docs/framework/react/plugins/persistQueryClient.md"
