      - mistake: "Rendering before async restore"
        mechanism: "Queries can mount and fetch while restore is still in progress."
        wrong_pattern: |
          persistQueryClient({ queryClient, persister })
          root.render(<App />)
        correct_pattern: |
          root.render(
            <PersistQueryClientProvider client={queryClient} persistOptions={{ persister }}>
              <App />
            </PersistQueryClientProvider>,
          )
        source: "docs/framework/react/plugins/persistQueryClient.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "No default mutationFn for persisted mutation"
        mechanism: "Paused persisted mutations need mutation defaults to resume after reload because functions cannot be serialized."
        wrong_pattern: |
          useMutation({ mutationKey: ['addTodo'], mutationFn: addTodo })
        correct_pattern: |
          queryClient.setMutationDefaults(['addTodo'], { mutationFn: addTodo })
          useMutation({ mutationKey: ['addTodo'] })
        source: "docs/framework/react/guides/mutations.md; docs/framework/react/plugins/persistQueryClient.md"
        priority: "HIGH"
