      - "setQueryData from event payloads"
    tasks:
      - "Sync cache changes across tabs"
      - "Invalidate queries from WebSocket events"
      - "Choose invalidation instead of normalized writes"
    compositions:
      - library: "WebSocket clients"
        skill: "Invalidate or update Query cache from realtime events"
      - library: "BroadcastChannel"
        skill: "Broadcast cache between browser tabs"
    failure_modes:
      - mistake: "Using experimental broadcast without version lock"
        mechanism: "The package is experimental and may break in minor or patch releases."
        wrong_pattern: |
          pnpm add @tanstack/query-broadcast-client-experimental
        correct_pattern: |
          pnpm add @tanstack/query-broadcast-client-experimental@5.101.0
        source: "docs/framework/react/plugins/broadcastQueryClient.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Manual normalized cache everywhere"
        mechanism: "TanStack Query prefers targeted invalidation and atomic cache writes over schema-level normalized cache maintenance."
        wrong_pattern: |
          event.entities.todos.forEach((todo) => {
            queryClient.setQueryData(['todos'], normalize(todo))
          })
        correct_pattern: |
          queryClient.invalidateQueries({ queryKey: ['todos'] })
