      - "Share pending mutation state across components"
    failure_modes:
      - mistake: "Multiple mutate arguments"
        mechanism: "mutate accepts one variables value; use an object for multiple fields."
        wrong_pattern: |
          mutation.mutate(title, body)
        correct_pattern: |
          mutation.mutate({ title, body })
        source: "docs/framework/react/guides/mutations.md; TKDodo Mastering Mutations"
        priority: "HIGH"
        status: "active"
      - mistake: "Per-call callbacks expected after unmount"
        mechanism: "Callbacks passed to mutate run only if the observer is still mounted and only for the last consecutive call."
        wrong_pattern: |
          todos.forEach((todo) => mutate(todo, { onSuccess: toastSuccess }))
        correct_pattern: |
          const mutation = useMutation({
            mutationFn: addTodo,
            onSuccess: toastSuccess,
          })
          todos.forEach((todo) => mutation.mutate(todo))
        source: "docs/framework/react/guides/mutations.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Not awaiting invalidation when pending UI depends on it"
        mechanism: "Returning the invalidation promise keeps the mutation pending until refetch finishes."
        wrong_pattern: |
          useMutation({
            mutationFn: addTodo,
            onSettled: () => {
              queryClient.invalidateQueries({ queryKey: ['todos'] })
            },
          })
        correct_pattern: |
          useMutation({
            mutationFn: addTodo,
            onSettled: () => queryClient.invalidateQueries({ queryKey: ['todos'] }),
          })
        source: "docs/framework/react/guides/optimistic-updates.md; TKDodo Automatic Query Invalidation after Mutations"
        priority: "HIGH"
        status: "active"

  - name: "Implement optimistic updates and cache writes"
    slug: "implement-optimistic-updates-and-cache-writes"
    domain: "writing-server-state"
    description: "Choose UI-level optimistic rendering or direct cache writes, cancel stale reads, snapshot, rollback, and refetch safely."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "onMutate"
      - "onError"
      - "onSettled"
      - "cancelQueries"
      - "setQueryData"
      - "useMutationState"
    tasks:
      - "Show pending items with variables"
      - "Write optimistic cache updates"
      - "Roll back failed mutations"
    failure_modes:
      - mistake: "Optimistic write without cancelling refetch"
        mechanism: "An in-flight refetch can resolve after the optimistic write and clobber it."
        wrong_pattern: |
          onMutate: (newTodo) => {
            queryClient.setQueryData(['todos'], (old) => [...old, newTodo])
          }
        correct_pattern: |
          onMutate: async (newTodo, context) => {
            await context.client.cancelQueries({ queryKey: ['todos'] })
            const previousTodos = context.client.getQueryData(['todos'])
            context.client.setQueryData(['todos'], (old) => [...old, newTodo])
            return { previousTodos }
          }
        source: "docs/framework/react/guides/optimistic-updates.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Mutating cached data in place"
        mechanism: "Cache writes must be immutable to preserve observer notifications and structural sharing."
        wrong_pattern: |
          queryClient.setQueryData(['todo', id], (old) => {
            old.title = title
            return old
          })
        correct_pattern: |
          queryClient.setQueryData(['todo', id], (old) => ({
            ...old,
            title,
          }))
        source: "docs/reference/QueryClient.md; docs/framework/react/guides/updates-from-mutation-responses.md"
        priority: "CRITICAL"
        status: "active"
        skills: ["implement-optimistic-updates-and-cache-writes", "shape-data-and-render-efficiently"]
      - mistake: "Persisted persister loses optimistic cache write"
        mechanism: "experimental_createQueryPersister does not persist setQueryData writes until invalidation/refetch persists real data."
        wrong_pattern: |
          context.client.setQueryData(['todos'], optimisticTodos)
          // user refreshes before invalidation finishes
        correct_pattern: |
          context.client.setQueryData(['todos'], optimisticTodos)
          return context.client.invalidateQueries({ queryKey: ['todos'] })
        source: "docs/framework/react/plugins/createPersister.md; docs/framework/vue/plugins/createPersister.md"
        priority: "HIGH"
        status: "active"
        skills: ["implement-optimistic-updates-and-cache-writes", "persist-offline-and-restore-caches"]

  - name: "Cancel queries and consume AbortSignals"
    slug: "cancel-queries-and-consume-abort-signals"
    domain: "writing-server-state"
    description: "Use AbortSignal-aware query functions, manual cancellation, cancellation options, and understand state revert behavior."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "QueryFunctionContext.signal"
      - "cancelQueries"
      - "CancelledError"
      - "cancel options"
      - "axios and fetch cancellation"
    tasks:
      - "Abort fetch requests on key changes"
      - "Cancel a slow query from UI"
      - "Protect optimistic updates from stale refetches"
    failure_modes:
      - mistake: "Ignoring signal in long request"
        mechanism: "Without consuming signal, unused queries can still resolve and populate cache."
        wrong_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: () => fetch('/todos').then((r) => r.json()),
          })
        correct_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: ({ signal }) => fetch('/todos', { signal }).then((r) => r.json()),
          })
        source: "docs/framework/react/guides/query-cancellation.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Assuming unmount always cancels"
        mechanism: "Default behavior keeps unresolved query promises running unless the signal is consumed."
        wrong_pattern: |
          // rely on component unmount to abort the network request
        correct_pattern: |
          queryFn: async ({ signal }) => {
            const response = await fetch(url, { signal })
            return response.json()
          }
        source: "docs/framework/react/guides/query-cancellation.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Suspense cancellation expected"
        mechanism: "Cancellation does not work with Suspense hooks."
        wrong_pattern: |
          const query = useSuspenseQuery({ queryKey, queryFn })
          await queryClient.cancelQueries({ queryKey })
        correct_pattern: |
          const query = useQuery({ queryKey, queryFn })
          await queryClient.cancelQueries({ queryKey })
        source: "docs/framework/react/guides/query-cancellation.md"
        priority: "MEDIUM"
        status: "active"
        skills: ["cancel-queries-and-consume-abort-signals", "use-suspense-and-error-boundaries"]

  - name: "Seed, placeholder, select, and transform data"
    slug: "seed-placeholder-select-and-transform-data"
    domain: "shaping-cache-and-render-behavior"
    description: "Use initialData, placeholderData, keepPreviousData, select, queryOptions, and cache seeding without corrupting timestamps or shapes."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "initialData"
      - "placeholderData"
      - "keepPreviousData"
      - "select"
      - "dataUpdatedAt"
      - "ensureQueryData"
    tasks:
      - "Seed detail data from a list"
      - "Keep previous page visible"
      - "Transform returned data for a component"
    failure_modes:
      - mistake: "Expecting initialData to overwrite fresher cache"
        mechanism: "initialData never overwrites existing cache data, even if the incoming value is fresher."
        wrong_pattern: |
          useQuery({ queryKey: ['posts'], queryFn: getPosts, initialData: props.posts })
        correct_pattern: |
          await queryClient.prefetchQuery({ queryKey: ['posts'], queryFn: getPosts })
          return <HydrationBoundary state={dehydrate(queryClient)}><Posts /></HydrationBoundary>
        source: "docs/framework/react/guides/ssr.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Using v4 keepPreviousData option"
        mechanism: "v5 replaced keepPreviousData option with placeholderData identity."
        wrong_pattern: |
          useQuery({
            queryKey,
            queryFn,
            keepPreviousData: true,
          })
        correct_pattern: |
          useQuery({
            queryKey,
            queryFn,
            placeholderData: keepPreviousData,
          })
        source: "docs/framework/react/guides/migrating-to-v5.md; docs/framework/react/guides/paginated-queries.md"
        priority: "CRITICAL"
        status: "fixed-but-legacy-risk"
      - mistake: "Selector throwing breaks observer"
        mechanism: "select should transform successful data; errors belong in queryFn so Query state can represent them."
        wrong_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: fetchTodos,
            select: (data) => {
              if (!data.length) throw new Error('empty')
              return data
            },
          })
        correct_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: async () => {
              const data = await fetchTodos()
              if (!data.length) throw new Error('empty')
              return data
            },
          })
        source: "packages/query-core/src/queryObserver.ts; docs/framework/react/guides/render-optimizations.md"
        priority: "MEDIUM"
        status: "active"

  - name: "Shape data and render efficiently"
    slug: "shape-data-and-render-efficiently"
    domain: "shaping-cache-and-render-behavior"
    description: "Use structural sharing, tracked properties, select functions, memoized combine functions, and adapter-specific immutable result rules."
    type: "framework"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
