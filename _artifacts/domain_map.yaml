          useEffect(() => {
            queryClient.prefetchQuery(commentsOptions(id))
          }, [id])
        correct_pattern: |
          usePrefetchQuery(commentsOptions(id))
          return <Suspense><Article id={id} /></Suspense>
        source: "docs/framework/react/guides/prefetching.md"
        priority: "HIGH"
        status: "active"

