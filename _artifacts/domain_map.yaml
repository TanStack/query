  - name: "Test query code"
    slug: "test-query-code"
    domain: "operational-quality"
    description: "Build isolated QueryClient test wrappers, disable retries, clear caches, mock network clients, and assert async query and mutation behavior."
    type: "lifecycle"
    packages:
      - "@tanstack/query-test-utils"
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
    covers:
      - "test QueryClient"
      - "retry false"
      - "queryClient.clear"
      - "waitFor"
      - "TestBed"
      - "network stubs"
    tasks:
      - "Test a query hook or composable"
      - "Test mutations and optimistic updates"
      - "Avoid cache bleed between tests"
    failure_modes:
      - mistake: "Reusing test client across tests"
        mechanism: "Query cache data can leak into later tests."
        wrong_pattern: |
          const queryClient = new QueryClient()
          const wrapper = ({ children }) => <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
        correct_pattern: |
          function createWrapper() {
            const queryClient = new QueryClient({ defaultOptions: { queries: { retry: false } } })
            return ({ children }) => <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
          }
        source: "docs/framework/react/guides/testing.md; docs/framework/angular/guides/testing.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Retry backoff hides assertion timing"
        mechanism: "Default retries delay failures, making tests slow or flaky."
        wrong_pattern: |
          const client = new QueryClient()
        correct_pattern: |
          const client = new QueryClient({
            defaultOptions: { queries: { retry: false } },
          })
        source: "docs/framework/react/guides/testing.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Asserting before async success"
        mechanism: "Queries update asynchronously; tests should wait for success state or rendered output."
        wrong_pattern: |
          const { result } = renderHook(() => useQuery(options), { wrapper })
          expect(result.current.data).toEqual(data)
        correct_pattern: |
          const { result } = renderHook(() => useQuery(options), { wrapper })
          await waitFor(() => expect(result.current.isSuccess).toBe(true))
          expect(result.current.data).toEqual(data)
        source: "docs/framework/react/guides/testing.md"
        priority: "HIGH"
        status: "active"

  - name: "Migrate major versions and codemods"
    slug: "migrate-major-versions-and-codemods"
    domain: "operational-quality"
    description: "Migrate v3 to v4, v4 to v5, Svelte v5 adapter to v6, Vue v5 changes, removed overloads, renamed options, and codemods."
    type: "lifecycle"
    packages:
      - "@tanstack/query-codemods"
      - "@tanstack/react-query"
      - "@tanstack/vue-query"
      - "@tanstack/svelte-query"
      - "@tanstack/query-core"
      - "@tanstack/eslint-plugin-query"
    covers:
      - "v5 object syntax"
      - "cacheTime to gcTime"
      - "keepPreviousData to placeholderData"
      - "query callbacks removed"
      - "Svelte runes migration"
      - "Vue useQueries ref return"
    tasks:
      - "Run v5 remove-overloads codemod"
      - "Replace removed query callbacks"
      - "Migrate Svelte Query stores to runes"
    failure_modes:
      - mistake: "v4 overload syntax in v5"
        mechanism: "v5 supports one object signature for hooks and QueryClient methods."
        wrong_pattern: |
          useQuery(['todos'], fetchTodos, { staleTime: 1000 })
        correct_pattern: |
          useQuery({ queryKey: ['todos'], queryFn: fetchTodos, staleTime: 1000 })
        source: "docs/framework/react/guides/migrating-to-v5.md"
        priority: "CRITICAL"
        status: "fixed-but-legacy-risk"
      - mistake: "Query callbacks on useQuery"
        mechanism: "onSuccess, onError, and onSettled were removed from queries in v5."
        wrong_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: fetchTodos,
            onSuccess: syncTodos,
          })
        correct_pattern: |
          const query = useQuery({ queryKey: ['todos'], queryFn: fetchTodos })
          useEffect(() => {
            if (query.data) syncTodos(query.data)
          }, [query.data])
        source: "docs/framework/react/guides/migrating-to-v5.md"
        priority: "CRITICAL"
        status: "fixed-but-legacy-risk"
      - mistake: "cacheTime option in v5"
        mechanism: "cacheTime was renamed to gcTime to clarify it only runs after a query is unused."
        wrong_pattern: |
          new QueryClient({
            defaultOptions: { queries: { cacheTime: 10 * 60 * 1000 } },
          })
        correct_pattern: |
          new QueryClient({
            defaultOptions: { queries: { gcTime: 10 * 60 * 1000 } },
          })
        source: "docs/framework/react/guides/migrating-to-v5.md"
        priority: "HIGH"
        status: "fixed-but-legacy-risk"

