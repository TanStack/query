skills:
  - name: "Set up QueryClient and providers"
    slug: "setup-query-client-and-providers"
    domain: "bootstrapping-query-clients"
    description: "Install the right adapter, create stable QueryClient instances, and wire framework providers without leaking cache between renders or requests."
    type: "lifecycle"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "QueryClient"
      - "QueryClientProvider"
      - "VueQueryPlugin"
      - "provideTanStackQuery"
      - "Lit QueryClientProvider custom element"
      - "useQueryClient and explicit clients"
    tasks:
      - "Create a client in an SPA"
      - "Create per-request clients for SSR"
      - "Wire provider context for framework adapters"
    failure_modes:
      - mistake: "New client on every render"
        mechanism: "The QueryClient owns the caches; recreating it discards cache and subscriptions."
        wrong_pattern: |
          function App() {
            const queryClient = new QueryClient()
            return <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
          }
        correct_pattern: |
          function App() {
            const [queryClient] = React.useState(() => new QueryClient())
            return <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
          }
        source: "docs/eslint/stable-query-client.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Shared SSR cache between users"
        mechanism: "A module-level client in SSR can pass one user's dehydrated data to another request."
        wrong_pattern: |
          const queryClient = new QueryClient()
          export default function MyApp() {
            return <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
          }
        correct_pattern: |
          export default function MyApp() {
            const [queryClient] = React.useState(() => new QueryClient())
            return <QueryClientProvider client={queryClient}>{children}</QueryClientProvider>
          }
        source: "docs/framework/react/guides/ssr.md"
        priority: "CRITICAL"
        status: "active"
        skills: ["setup-query-client-and-providers", "ssr-hydration-and-streaming"]
      - mistake: "Ambiguous Lit fallback client"
        mechanism: "Lit fallback lookup throws if multiple distinct QueryClientProvider instances are connected."
        wrong_pattern: |
          const client = useQueryClient()
          createQueryController(this, { queryKey: ['todos'], queryFn: fetchTodos })
        correct_pattern: |
          createQueryController(this, {
            queryKey: ['todos'],
            queryFn: fetchTodos,
          }, explicitClient)
        source: "docs/framework/lit/guides/reactive-controllers-vs-hooks.md"
        priority: "HIGH"
        status: "active"

  - name: "Design query keys and reusable options"
    slug: "design-query-keys-and-options"
    domain: "reading-server-state"
    description: "Model query identity, dependencies, query functions, queryOptions, infiniteQueryOptions, mutationOptions, and skipToken in a type-safe reusable way."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "queryKey"
      - "queryFn"
      - "queryOptions"
      - "infiniteQueryOptions"
      - "mutationOptions"
      - "skipToken"
      - "global Register types"
    tasks:
      - "Build a key factory"
      - "Extract reusable options"
      - "Use typed keys with QueryClient methods"
    reference_candidates:
      - topic: "Reusable option helper signatures across adapters"
        reason: "Each adapter exposes equivalent helpers with framework-specific generic and reactivity surfaces."
    failure_modes:
      - mistake: "Missing variables in query key"
        mechanism: "Query keys are dependencies; variables used by queryFn must be part of the key to cache and refetch independently."
        wrong_pattern: |
          useQuery({
            queryKey: ['todo'],
            queryFn: () => api.getTodo(todoId),
          })
        correct_pattern: |
          useQuery({
            queryKey: ['todo', todoId],
            queryFn: () => api.getTodo(todoId),
          })
        source: "docs/framework/react/guides/query-keys.md; docs/eslint/exhaustive-deps.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Separated key and queryFn drift"
        mechanism: "Duplicating keys across hook calls and QueryClient methods allows the same key to point at different functions."
        wrong_pattern: |
          useQuery({ queryKey: ['todo', id], queryFn: () => api.getTodo(id) })
          queryClient.invalidateQueries({ queryKey: ['todo', id] })
        correct_pattern: |
          const todoOptions = (id) => queryOptions({
            queryKey: ['todo', id],
            queryFn: () => api.getTodo(id),
          })
          useQuery(todoOptions(id))
          queryClient.invalidateQueries({ queryKey: todoOptions(id).queryKey })
        source: "docs/framework/react/guides/query-options.md; docs/eslint/prefer-query-options.md"
        priority: "HIGH"
        status: "active"
      - mistake: "skipToken inside suspense query"
        mechanism: "Suspense hooks require data and do not support conditional disabling through skipToken."
        wrong_pattern: |
          useSuspenseQuery({
            queryKey: ['user', id],
            queryFn: id ? () => getUser(id) : skipToken,
          })
        correct_pattern: |
          const query = useQuery({
            queryKey: ['user', id],
            queryFn: id ? () => getUser(id) : skipToken,
          })
        source: "packages/react-query/src/useSuspenseQuery.ts; docs/framework/react/guides/suspense.md"
        priority: "HIGH"
        status: "active"
        skills: ["design-query-keys-and-options", "use-suspense-and-error-boundaries"]

  - name: "Fetch and observe queries"
    slug: "fetch-and-observe-queries"
    domain: "reading-server-state"
    description: "Use query APIs to read server state, interpret status and fetchStatus, handle errors, and keep query functions pure and cacheable."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "useQuery"
      - "createQuery"
      - "injectQuery"
      - "createQueryController"
      - "QueryObserver"
      - "status and fetchStatus"
      - "query function context"
    tasks:
      - "Render loading, error, and success states"
      - "Use AbortSignal from QueryFunctionContext"
      - "Differentiate data status from fetch status"
    failure_modes:
      - mistake: "Void query function"
        mechanism: "TanStack Query caches the resolved value; undefined data is a configuration error."
        wrong_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: async () => {
              await api.todos.fetch()
            },
          })
        correct_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: async () => {
              return await api.todos.fetch()
            },
          })
        source: "docs/eslint/no-void-query-fn.md; docs/framework/react/reference/useQuery.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Only checking isPending for offline state"
        mechanism: "A pending query can have fetchStatus paused when networkMode prevents execution."
        wrong_pattern: |
          if (query.isPending) return <Spinner />
        correct_pattern: |
          if (query.isPending && query.fetchStatus === 'paused') return <Offline />
          if (query.isPending) return <Spinner />
        source: "docs/framework/react/guides/queries.md; docs/framework/react/guides/network-mode.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Using mutations for reads"
        mechanism: "Queries represent idempotent server-state reads; writes and side effects belong in mutations."
        wrong_pattern: |
          useQuery({
            queryKey: ['createTodo'],
            queryFn: () => api.createTodo(input),
          })
        correct_pattern: |
          useMutation({
            mutationFn: (input) => api.createTodo(input),
          })
        source: "docs/framework/react/guides/queries.md; docs/framework/react/guides/mutations.md"
        priority: "HIGH"
        status: "active"

  - name: "Tune defaults, freshness, retries, and refetching"
    slug: "tune-defaults-freshness-retries-and-refetching"
    domain: "coordinating-query-execution"
    description: "Apply important defaults, staleTime, gcTime, retry, refetch triggers, polling, focusManager, onlineManager, and networkMode."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "staleTime"
      - "gcTime"
      - "retry and retryDelay"
      - "refetchOnWindowFocus"
      - "refetchOnReconnect"
      - "networkMode"
      - "focusManager"
      - "onlineManager"
    tasks:
      - "Prevent excessive refetches"
      - "Set cache retention policy"
      - "Support offline-first or always-available queryFns"
    failure_modes:
      - mistake: "Confusing gcTime with freshness"
        mechanism: "gcTime only applies after a query becomes unused; staleTime controls freshness and refetching."
        wrong_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: fetchTodos,
            gcTime: 60_000,
          })
        correct_pattern: |
          useQuery({
            queryKey: ['todos'],
            queryFn: fetchTodos,
            staleTime: 60_000,
          })
        source: "docs/framework/react/guides/important-defaults.md; docs/framework/react/guides/migrating-to-v5.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Static staleTime blocks invalidation"
        mechanism: "staleTime: 'static' is stricter than Infinity and ignores manual invalidation refetches."
        wrong_pattern: |
          useQuery({
            queryKey: ['permissions'],
            queryFn: fetchPermissions,
            staleTime: 'static',
          })
          queryClient.invalidateQueries({ queryKey: ['permissions'] })
        correct_pattern: |
          useQuery({
            queryKey: ['permissions'],
            queryFn: fetchPermissions,
            staleTime: Infinity,
          })
          queryClient.invalidateQueries({ queryKey: ['permissions'] })
        source: "docs/framework/react/guides/important-defaults.md; docs/reference/QueryClient.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Tests hang on default retries"
        mechanism: "Failed queries retry three times with exponential backoff by default."
        wrong_pattern: |
          renderHook(() => useQuery({ queryKey: ['x'], queryFn: failingFn }), { wrapper })
        correct_pattern: |
          const queryClient = new QueryClient({
            defaultOptions: { queries: { retry: false } },
          })
        source: "docs/framework/react/guides/testing.md; docs/framework/angular/guides/testing.md"
        priority: "HIGH"
        status: "active"
        skills: ["tune-defaults-freshness-retries-and-refetching", "test-query-code"]

  - name: "Coordinate dependent, parallel, disabled, and background queries"
    slug: "coordinate-dependent-parallel-disabled-and-background-queries"
    domain: "coordinating-query-execution"
    description: "Compose multiple queries, dependent queries, disabled queries, background indicators, polling, and scroll restoration."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "useQueries"
      - "enabled"
      - "skipToken"
      - "useIsFetching"
      - "refetchInterval"
      - "scroll restoration"
    tasks:
      - "Fetch multiple independent resources"
      - "Fetch after another query succeeds"
      - "Show background fetching without replacing content"
    failure_modes:
      - mistake: "Imperative disabled query as lazy fetch"
        mechanism: "Permanently disabling queries opts out of invalidation and background behavior."
        wrong_pattern: |
          const query = useQuery({
            queryKey: ['todos'],
            queryFn: fetchTodos,
            enabled: false,
          })
          return <button onClick={() => query.refetch()}>Load</button>
        correct_pattern: |
          const query = useQuery({
            queryKey: ['todos', filters],
            queryFn: () => fetchTodos(filters),
            enabled: Boolean(filters),
          })
        source: "docs/framework/react/guides/disabling-queries.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Duplicate keys in useQueries"
        mechanism: "The same key can share data between entries and confuse placeholder or select behavior."
        wrong_pattern: |
          useQueries({
            queries: ids.map(() => ({ queryKey: ['user'], queryFn: fetchUser })),
          })
        correct_pattern: |
          useQueries({
            queries: ids.map((id) => ({ queryKey: ['user', id], queryFn: () => fetchUser(id) })),
          })
        source: "docs/framework/react/reference/useQueries.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Showing full-page spinner on background refetch"
        mechanism: "isFetching includes background refetches while status describes whether data exists."
        wrong_pattern: |
          if (query.isFetching) return <Spinner />
        correct_pattern: |
          if (query.isPending) return <Spinner />
          return <>{query.isFetching ? <SmallRefresh /> : null}<Todos data={query.data} /></>
        source: "docs/framework/react/guides/background-fetching-indicators.md; docs/framework/react/guides/queries.md"
        priority: "MEDIUM"
        status: "active"

  - name: "Paginate and build infinite queries"
    slug: "paginate-and-build-infinite-queries"
    domain: "coordinating-query-execution"
    description: "Implement page-indexed queries, placeholderData, infinite queries, maxPages, bi-directional lists, and safe manual infinite cache updates."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
      - "@tanstack/preact-query"
      - "@tanstack/vue-query"
      - "@tanstack/solid-query"
      - "@tanstack/svelte-query"
      - "@tanstack/angular-query-experimental"
      - "@tanstack/lit-query"
    covers:
      - "useInfiniteQuery"
      - "createInfiniteQuery"
      - "injectInfiniteQuery"
      - "createInfiniteQueryController"
      - "initialPageParam"
      - "getNextPageParam"
      - "maxPages"
      - "keepPreviousData"
    tasks:
      - "Build numbered pagination"
      - "Build load-more and infinite scroll"
      - "Limit stored pages"
    failure_modes:
      - mistake: "Missing initialPageParam"
        mechanism: "v5 infinite queries require an explicit initial page param."
        wrong_pattern: |
          useInfiniteQuery({
            queryKey: ['projects'],
            queryFn: fetchProjects,
            getNextPageParam: (lastPage) => lastPage.nextCursor,
          })
        correct_pattern: |
          useInfiniteQuery({
            queryKey: ['projects'],
            queryFn: fetchProjects,
            initialPageParam: 0,
            getNextPageParam: (lastPage) => lastPage.nextCursor,
          })
        source: "docs/framework/react/guides/infinite-queries.md; docs/framework/react/guides/migrating-to-v5.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Overlapping infinite fetches"
        mechanism: "One cache entry is shared for all pages; fetchNextPage during an active fetch can overwrite background refresh data."
        wrong_pattern: |
          <List onEndReached={() => fetchNextPage()} />
        correct_pattern: |
          <List onEndReached={() => hasNextPage && !isFetching && fetchNextPage()} />
        source: "docs/framework/react/guides/infinite-queries.md; docs/framework/lit/guides/infinite-queries.md"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Breaking infinite data shape"
        mechanism: "Infinite query cache data must always keep pages and pageParams arrays."
        wrong_pattern: |
          queryClient.setQueryData(['projects'], (data) => data.pages.slice(1))
        correct_pattern: |
          queryClient.setQueryData(['projects'], (data) => ({
            pages: data.pages.slice(1),
            pageParams: data.pageParams.slice(1),
          }))
        source: "docs/framework/react/guides/infinite-queries.md"
        priority: "HIGH"
        status: "active"

  - name: "Write mutations and invalidate related queries"
