  - name: "Build Query abstractions"
    slug: "build-query-abstractions"
    domain: "reading-server-state"
    description: "Create queryOptions factories, feature-local key modules, and custom hooks that preserve inference and work across hooks, loaders, prefetches, and QueryClient calls."
    type: "core"
    packages:
      - "@tanstack/react-query"
      - "@tanstack/query-core"
    covers:
      - "queryOptions factories"
      - "custom hooks on top of options"
      - "usage-site option composition"
      - "TypeScript select inference"
    tasks:
      - "Extract a queryOptions factory"
      - "Share options between loader, hook, and prefetch"
      - "Avoid wide UseQueryOptions wrappers"
    failure_modes:
      - mistake: "Custom hook is the only abstraction"
        mechanism: "Hooks cannot run in route loaders, server prefetches, or event handlers."
        wrong_pattern: |
          export function useInvoice(id) {
            return useQuery({ queryKey: ['invoice', id], queryFn: () => fetchInvoice(id) })
          }
        correct_pattern: |
          export function invoiceOptions(id) {
            return queryOptions({ queryKey: ['invoice', id], queryFn: () => fetchInvoice(id) })
          }
          export function useInvoice(id) {
            return useQuery(invoiceOptions(id))
          }
        source: "https://tkdodo.eu/blog/creating-query-abstractions"
        priority: "HIGH"
        status: "active"
      - mistake: "Wide UseQueryOptions wrapper breaks inference"
        mechanism: "Generic options wrappers often lose select inference and key typing."
        wrong_pattern: |
          function useInvoice(id, options?: Partial<UseQueryOptions<Invoice>>) {
            return useQuery({ queryKey: ['invoice', id], queryFn: () => fetchInvoice(id), ...options })
          }
        correct_pattern: |
          useQuery({
            ...invoiceOptions(id),
            select: (invoice) => invoice.createdAt,
          })
        source: "https://tkdodo.eu/blog/creating-query-abstractions"
        priority: "HIGH"
        status: "active"
      - mistake: "Wrapper hides Query result state"
        mechanism: "Returning only data hides status, error, refetch, and background-fetch state from callers."
        wrong_pattern: |
          export function useInvoice(id) {
            return useQuery(invoiceOptions(id)).data
          }
        correct_pattern: |
          export function useInvoice(id) {
            return useQuery(invoiceOptions(id))
          }
        source: "docs/framework/react/guides/queries.md"
        priority: "MEDIUM"
        status: "active"

  - name: "Understand Query internals and observers"
    slug: "understand-query-internals-and-observers"
    domain: "reading-server-state"
    description: "Explain and debug QueryClient, QueryCache, MutationCache, Query, QueryObserver, active versus inactive queries, observer-level options, and subscription behavior."
    type: "core"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
    covers:
      - "QueryClient"
      - "QueryCache"
      - "MutationCache"
      - "Query"
      - "QueryObserver"
      - "active and inactive queries"
      - "observer-level options"
    tasks:
      - "Explain why a query did or did not refetch"
      - "Debug active observer count"
      - "Choose QueryClient APIs versus observed hook reads"
    failure_modes:
      - mistake: "Treating cache presence as active usage"
        mechanism: "Imperative cache reads do not create observers, so refetch triggers and garbage collection differ from useQuery."
        wrong_pattern: |
          const todo = queryClient.getQueryData(['todo', id])
        correct_pattern: |
          const todo = useQuery(todoOptions(id))
        source: "https://tkdodo.eu/blog/inside-react-query"
        priority: "HIGH"
        status: "active"
      - mistake: "Expecting one query to have one option set"
        mechanism: "Several options, including select and staleTime, live on observers and can differ per component."
        wrong_pattern: |
          queryClient.getQueryCache().find({ queryKey })?.options.staleTime
        correct_pattern: |
          queryClient.getQueryCache().find({ queryKey })?.observers.map((observer) => observer.options.staleTime)
        source: "https://tkdodo.eu/blog/inside-react-query"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Expecting inactive queries to refetch like mounted queries"
        mechanism: "Inactive queries are cached but not observed by a mounted component."
        wrong_pattern: |
          queryClient.getQueryData(['todos'])
          queryClient.invalidateQueries({ queryKey: ['todos'] })
        correct_pattern: |
          useQuery(todosOptions())
          queryClient.invalidateQueries({ queryKey: ['todos'], refetchType: 'active' })
        source: "https://tkdodo.eu/blog/inside-react-query"
        priority: "MEDIUM"
        status: "active"

  - name: "Handle status checks and errors"
    slug: "handle-status-and-errors"
    domain: "reading-server-state"
    description: "Design loading, stale data, background refetch, error boundary, throwOnError, toast, and validation-error handling without erasing useful cached data."
    type: "framework"
    packages:
      - "@tanstack/react-query"
      - "@tanstack/query-core"
    covers:
      - "status"
      - "fetchStatus"
      - "isPending"
      - "isFetching"
      - "isError with data"
      - "throwOnError"
      - "QueryCache onError"
    tasks:
      - "Render stale data after background error"
      - "Route severe errors to Error Boundaries"
      - "Avoid duplicated observer-level error toasts"
    failure_modes:
      - mistake: "Hiding stale data on background error"
        mechanism: "A query can have cached data and an error from a later background refetch."
        wrong_pattern: |
          if (query.isError) return <ErrorMessage error={query.error} />
          if (query.data) return <Todos todos={query.data} />
        correct_pattern: |
          if (query.data) return <Todos todos={query.data} staleError={query.isError ? query.error : null} />
          if (query.isError) return <ErrorMessage error={query.error} />
        source: "https://tkdodo.eu/blog/status-checks-in-react-query"
        priority: "HIGH"
        status: "active"
      - mistake: "Sending validation errors to a global boundary"
        mechanism: "Expected 4xx form errors should stay near the form while 5xx errors can go to the boundary."
        wrong_pattern: |
          useMutation({ mutationFn: submitForm, throwOnError: true })
        correct_pattern: |
          useMutation({ mutationFn: submitForm, throwOnError: (error) => error.status >= 500 })
        source: "https://tkdodo.eu/blog/react-query-error-handling"
        priority: "HIGH"
        status: "active"
      - mistake: "Duplicated toast notifications per observer"
        mechanism: "Observer-level error callbacks can fire once per observer for the same underlying query."
        wrong_pattern: |
          useQuery({ queryKey: ['todos'], queryFn: fetchTodos, onError: toastError })
        correct_pattern: |
          new QueryClient({ queryCache: new QueryCache({ onError: toastError }) })
        source: "https://tkdodo.eu/blog/react-query-error-handling"
        priority: "MEDIUM"
        status: "active"

  - name: "Query data and forms"
    slug: "query-data-and-forms"
    domain: "writing-server-state"
    description: "Integrate Query data and mutations with forms by choosing initial-only server state, derived server-plus-client state, dirty field behavior, double-submit prevention, and reset-after-invalidation."
    type: "composition"
    packages:
      - "@tanstack/react-query"
    covers:
      - "form initial values"
      - "dirty client state"
      - "background form updates"
      - "mutation submission state"
      - "reset after invalidation"
    tasks:
      - "Initialize form fields from query data"
      - "Keep untouched fields updated from background refetches"
      - "Submit and reset forms after mutation invalidation"
    failure_modes:
      - mistake: "Initializing form defaults before query data exists"
        mechanism: "The first render usually has undefined query data."
        wrong_pattern: |
          const { data } = useQuery(personOptions(id))
          const [draft, setDraft] = useState(data)
        correct_pattern: |
          const { data } = useQuery(personOptions(id))
          if (!data) return <Loading />
          return <PersonForm initialPerson={data} />
        source: "https://tkdodo.eu/blog/react-query-and-forms"
        priority: "HIGH"
        status: "active"
      - mistake: "Background refetch overwrites dirty client state"
        mechanism: "Copying server data into form state on every update loses deliberate local edits."
        wrong_pattern: |
          useEffect(() => setDraft(personQuery.data), [personQuery.data])
        correct_pattern: |
          const shownFirstName = draft.firstName ?? personQuery.data?.firstName ?? ''
        source: "https://tkdodo.eu/blog/deriving-client-state-from-server-state"
        priority: "HIGH"
        status: "active"
      - mistake: "Double submit while mutation is pending"
        mechanism: "Forms can submit duplicate writes unless mutation state disables the action."
        wrong_pattern: |
          <button type="submit">Save</button>
        correct_pattern: |
          <button type="submit" disabled={mutation.isPending}>Save</button>
        source: "https://tkdodo.eu/blog/react-query-and-forms"
        priority: "MEDIUM"
        status: "active"

  - name: "Automatic invalidation after mutations"
    slug: "automatic-invalidation-after-mutations"
    domain: "writing-server-state"
    description: "Create app-level MutationCache invalidation policies with mutationKey scoping, meta invalidation tags, awaited invalidation, and exclusions for static data."
    type: "composition"
    packages:
      - "@tanstack/query-core"
      - "@tanstack/react-query"
    covers:
      - "MutationCache callbacks"
      - "mutationKey invalidation"
      - "mutation meta"
      - "matchQuery"
      - "awaited invalidation"
    tasks:
      - "Invalidate related queries after every mutation"
      - "Scope invalidation by mutation key"
      - "Attach explicit invalidation tags through mutation meta"
    failure_modes:
      - mistake: "Invalidating the whole app for every mutation"
        mechanism: "A global MutationCache callback without scope can refetch unrelated data."
        wrong_pattern: |
          new MutationCache({ onSuccess: () => queryClient.invalidateQueries() })
        correct_pattern: |
          new MutationCache({
            onSuccess: (_data, _variables, _context, mutation) =>
              queryClient.invalidateQueries({ queryKey: mutation.options.mutationKey }),
          })
        source: "https://tkdodo.eu/blog/automatic-query-invalidation-after-mutations"
        priority: "HIGH"
        status: "active"
      - mistake: "Not returning invalidation when pending UI depends on refetch"
        mechanism: "Returning the invalidation promise keeps the mutation pending until related reads are refreshed."
        wrong_pattern: |
          onSuccess: () => { queryClient.invalidateQueries({ queryKey: ['todos'] }) }
        correct_pattern: |
          onSuccess: () => queryClient.invalidateQueries({ queryKey: ['todos'] })
        source: "docs/framework/react/guides/invalidations-from-mutations.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Refetching data that should be static"
        mechanism: "Data that must ignore broad manual invalidation should opt into v5 static freshness."
        wrong_pattern: |
          useQuery({
            queryKey: ['build-info'],
            queryFn: fetchBuildInfo,
            staleTime: Infinity,
          })
        correct_pattern: |
          useQuery({
            queryKey: ['build-info'],
            queryFn: fetchBuildInfo,
            staleTime: 'static',
          })
        source: "https://tkdodo.eu/blog/automatic-query-invalidation-after-mutations"
        priority: "MEDIUM"
        status: "active"

  - name: "Concurrent optimistic updates"
    slug: "concurrent-optimistic-updates"
    domain: "writing-server-state"
    description: "Handle overlapping optimistic mutations with cancellation, scoped mutation keys, submittedAt identities, per-mutation rollback, filtered cache updates, and guarded invalidation."
    type: "core"
    packages:
      - "@tanstack/react-query"
      - "@tanstack/query-core"
    covers:
      - "useMutationState"
      - "submittedAt"
      - "queryClient.isMutating"
      - "mutationKey filters"
      - "filtered optimistic list updates"
    tasks:
      - "Render multiple pending optimistic rows"
      - "Prevent one invalidation from reverting another optimistic write"
      - "Keep filtered lists consistent during optimistic edits"
    failure_modes:
      - mistake: "One mutation invalidation reverts another optimistic update"
        mechanism: "An earlier settled mutation can refetch and overwrite a later pending optimistic write."
        wrong_pattern: |
          onSettled: () => queryClient.invalidateQueries({ queryKey: ['items'] })
        correct_pattern: |
          onSettled: () => {
            if (queryClient.isMutating({ mutationKey: ['items'] }) === 1) {
              return queryClient.invalidateQueries({ queryKey: ['items'] })
            }
          }
        source: "https://tkdodo.eu/blog/concurrent-optimistic-updates-in-react-query"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Optimistic list update ignores current filters"
        mechanism: "The optimistic cache write must mirror list filtering that the server response would apply."
        wrong_pattern: |
          old?.map((item) => item.id === updated.id ? updated : item)
        correct_pattern: |
          old?.map((item) => item.id === updated.id ? updated : item).filter((item) => matchesFilters(item, filters))
        source: "https://tkdodo.eu/blog/concurrent-optimistic-updates-in-react-query"
        priority: "HIGH"
        status: "active"
      - mistake: "Pending optimistic rows share unstable keys"
        mechanism: "Concurrent variables can be equal; submittedAt identifies each mutation attempt."
        wrong_pattern: |
          variables.map((title) => <li key={title}>{title}</li>)
        correct_pattern: |
          pending.map((mutation) => <li key={mutation.submittedAt}>{mutation.variables.title}</li>)
        source: "docs/framework/react/guides/optimistic-updates.md"
        priority: "HIGH"
        status: "active"

  - name: "Selectors and derived state"
    slug: "selectors-and-derived-state"
    domain: "shaping-cache-and-render-behavior"
    description: "Use select, stable selectors, structural sharing, queryOptions composition, and render-time derivation to subscribe to precise server-state slices without effect-based syncing."
    type: "core"
    packages:
      - "@tanstack/react-query"
      - "@tanstack/query-core"
    covers:
      - "select"
      - "selector identity"
      - "structural sharing of selected data"
      - "derived client state"
      - "usage-site select composition"
    tasks:
      - "Subscribe to one field from a larger response"
      - "Memoize expensive select transforms"
      - "Replace useEffect syncing with derived values"
    failure_modes:
      - mistake: "Syncing derived state through an effect"
        mechanism: "Server state changes can invalidate client selections without needing a side-effect sync."
        wrong_pattern: |
          useEffect(() => syncSelectedUser(users), [users])
        correct_pattern: |
          const selectedUser = users?.find((user) => user.id === selectedUserId)
        source: "https://tkdodo.eu/blog/deriving-client-state-from-server-state"
        priority: "HIGH"
        status: "active"
      - mistake: "Inline expensive select reruns on unrelated renders"
        mechanism: "Query reruns select when data changes or the select function identity changes."
        wrong_pattern: |
          useSuspenseQuery({ ...productsOptions(filters), select: (data) => expensiveTransform(data) })
        correct_pattern: |
          const selectProducts = (data) => expensiveTransform(data)
          useSuspenseQuery({ ...productsOptions(filters), select: selectProducts })
        source: "https://tkdodo.eu/blog/react-query-selectors-supercharged"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Using select to throw domain errors"
        mechanism: "select transforms successful data; query errors should be produced by queryFn."
        wrong_pattern: |
          useQuery({ queryKey: ['todos'], queryFn: fetchTodos, select: (todos) => {
            if (!todos.length) throw new Error('empty')
            return todos
          }})
        correct_pattern: |
          useQuery({ queryKey: ['todos'], queryFn: async () => {
            const todos = await fetchTodos()
            if (!todos.length) throw new Error('empty')
            return todos
          }})
        source: "docs/framework/react/guides/render-optimizations.md"
        priority: "MEDIUM"
        status: "active"

tensions:
  - name: "Declarative cache versus imperative fetch control"
    skills: ["coordinate-dependent-parallel-disabled-and-background-queries", "fetch-and-observe-queries"]
    description: "Disabled queries and manual refetch feel simple but opt out of the cache lifecycle that makes Query useful."
    implication: "Agents often generate button-driven refetch code instead of modeling dependencies in queryKey and enabled."
  - name: "SSR freshness versus user data isolation"
    skills: ["setup-query-client-and-providers", "compose-query-with-tanstack-router-and-start", "ssr-hydration-and-streaming", "tune-defaults-freshness-retries-and-refetching"]
    description: "SSR needs per-request clients and nonzero staleTime, but TanStack Router and Start also need the QueryClient placed in route context so loaders, hydration, and streaming share one request-local cache."
    implication: "Agents either create a global SSR client or create a fresh browser client during every render."
  - name: "Router-owned loading versus component-only queries"
    skills: ["prefetch-and-remove-request-waterfalls", "compose-query-with-tanstack-router-and-start", "ssr-hydration-and-streaming", "understand-query-internals-and-observers"]
    description: "TanStack Router and Start know the target route before render, but route loaders should prime Query cache rather than replace active Query observers."
    implication: "Agents that start from Next, component-only examples, or useLoaderData recreate waterfalls and bypass Query observer behavior."
  - name: "Optimistic responsiveness versus server truth"
    skills: ["implement-optimistic-updates-and-cache-writes", "concurrent-optimistic-updates", "write-mutations-and-invalidate-related-queries", "persist-offline-and-restore-caches"]
    description: "Optimistic cache writes improve UX but need cancellation, rollback, invalidation, and persistence awareness."
    implication: "Agents write optimistic data and forget that refetch, reload, or offline restore can overwrite or lose it."
  - name: "Reusable abstractions versus type erasure"
    skills: ["design-query-keys-and-options", "build-query-abstractions", "selectors-and-derived-state"]
    description: "Query abstraction should preserve the full options surface and select inference instead of hiding it behind wide custom hook wrappers."
    implication: "Agents often generate custom hooks that cannot run in loaders, cannot compose with Suspense, and break select typing."
  - name: "Automatic invalidation versus scoped freshness"
    skills: ["automatic-invalidation-after-mutations", "write-mutations-and-invalidate-related-queries", "tune-defaults-freshness-retries-and-refetching"]
    description: "Global mutation invalidation reduces boilerplate but can refetch unrelated or static data unless mutation keys, meta, or predicates scope it."
    implication: "Agents choose either no invalidation or invalidateQueries() everywhere."
  - name: "Form client ownership versus background server freshness"
    skills: ["query-data-and-forms", "selectors-and-derived-state", "write-mutations-and-invalidate-related-queries"]
    description: "Forms may intentionally copy server state as initial values, but collaborative or long-lived forms need derived server-plus-client state."
    implication: "Agents overwrite dirty fields with background refetches or disable useful background updates without acknowledging the tradeoff."
  - name: "Framework idioms versus copied React examples"
    skills: ["use-framework-adapter-reactivity", "design-query-keys-and-options", "ssr-hydration-and-streaming"]
    description: "Adapters share core concepts but differ in how reactivity and SSR hooks are expressed."
    implication: "Agents port React examples to Vue, Svelte, Angular, or Lit without preserving reactive inputs or provider boundaries."

